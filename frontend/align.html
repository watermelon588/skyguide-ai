<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      SkyGuide Companion — the phone's dedicated lightweight entry.
      Separate Vite input from the main SPA: the phone standing at the
      telescope downloads only pairing + sensors + guidance, never the
      dashboard bundle. Installable via /companion.webmanifest.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/companion.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/companion-180.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SkyGuide" />
    <title>SkyGuide Companion</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/align/main.jsx"></script>
  </body>
</html>
